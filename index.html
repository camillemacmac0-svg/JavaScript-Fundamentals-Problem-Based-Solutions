<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Micro-Learning Flashcards</title>


    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    
<script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2563eb',
                        secondary: '#10b981',
                        dark: '#1f2937',
                    },
                }
            }
        }
    </script>

    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-50 min-h-screen font-sans">
    <header class="bg-primary stick-top text-white shadow-md">
        <div class="container mx-auto px-4 py-4">
            <h1 class="text-2xl font-bold flex items-center">
                <i class="fas fa-brain mr-2"></i> Micro-Learning Flashcards
            </h1>
            <p class="text-blue-100">Learn faster, remember longer</p>
        </div>
    </header>

 <main class="container mx-auto px-4 py-8">
    
        <div class="mb-8 bg-white rounded-xl shadow p-6">
            <div class="flex justify-between items-center mb-2">
                <h2 class="text-xl font-semibold text-dark">Your Progress</h2>
                <span id="mastery-percentage" class="text-2xl font-bold text-secondary">0%</span>
            </div>
            <div class="w-full bg-gray-200 rounded-full h-4 overflow-hidden">
                <div id="progress-bar" class="bg-secondary h-full rounded-full transition-all duration-500" style="width: 0%"></div>
            </div>
            <p class="text-gray-500 mt-2"><span id="words-learned">0</span> out of <span id="total-words">0</span> words mastered</p>
        </div>

        <div class="max-w-2xl mx-auto mb-8">
            <div id="flashcard" class="card-flip w-full h-64 cursor-pointer mb-6">
                <div class="card-inner relative w-full h-full">
                    <div class="card-front absolute w-full h-full bg-white rounded-2xl shadow-lg flex flex-col justify-center items-center p-8 border-2 border-gray-100">
                        <h3 id="current-term" class="text-3xl font-bold text-dark text-center">Click to start</h3>
                        <p class="text-gray-400 mt-4">Tap card to reveal definition</p>
                    </div>
                    <div class="card-back absolute w-full h-full bg-blue-50 rounded-2xl shadow-lg flex flex-col justify-center items-center p-8 border-2 border-primary/20">
                        <h3 id="current-definition" class="text-2xl font-semibold text-primary text-center">Definition will appear here</h3>
                    </div>
                </div>
            </div>

<div class="flex justify-center gap-4">
                <button id="know-btn" class="bg-secondary hover:bg-secondary/90 text-white font-bold py-3 px-6 rounded-lg shadow transition flex items-center">
                    <i class="fas fa-check mr-2"></i> I Know This
                </button>
                <button id="next-btn" class="bg-primary hover:bg-primary/90 text-white font-bold py-3 px-6 rounded-lg shadow transition flex items-center">
                    <i class="fas fa-arrow-right mr-2"></i> Next Card
                </button>
                <button id="shuffle-btn" class="bg-gray-600 hover:bg-gray-700 text-white font-bold py-3 px-6 rounded-lg shadow transition flex items-center">
                    <i class="fas fa-random mr-2"></i> Shuffle
                </button>
            </div>
        </div>

 <div class="bg-white rounded-xl shadow p-6 max-w-2xl mx-auto">
            <h2 class="text-xl font-semibold text-dark mb-4 flex items-center">
                <i class="fas fa-plus-circle text-primary mr-2"></i> Add New Word
            </h2>
            <form id="add-card-form" class="space-y-4">
                <div>
                    <label for="term-input" class="block text-sm font-medium text-gray-700 mb-1">Word / Term</label>
                    <input type="text" id="term-input" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary transition" placeholder="e.g. gato" required>
                </div>

                <div>
                    <label for="definition-input" class="block text-sm font-medium text-gray-700 mb-1">Definition / Translation</label>
                    <input type="text" id="definition-input" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary transition" placeholder="e.g. cat" required>
                </div>
                <button type="submit" class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-3 px-6 rounded-lg shadow transition">
                    <i class="fas fa-save mr-2"></i> Add to Deck
                </button>
            </form>
        </div>
    </main>

<script src="script.js"></script>
</body>
</html>
