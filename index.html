<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Micro-Learning Flashcards</title>


    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    
<script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2563eb',
                        secondary: '#10b981',
                        dark: '#1f2937',
                    },
                }
            }
        }
    </script>

    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-50 min-h-screen font-sans">
    <header class="bg-primary text-white shadow-md">
        <div class="container mx-auto px-4 py-4">
            <h1 class="text-2xl font-bold flex items-center">
                <i class="fas fa-brain mr-2"></i> Micro-Learning Flashcards
            </h1>
            <p class="text-blue-100">Learn faster, remember longer</p>
        </div>
    </header>

 <main class="container mx-auto px-4 py-8">
    
        <div class="mb-8 bg-white rounded-xl shadow p-6">
            <div class="flex justify-between items-center mb-2">
                <h2 class="text-xl font-semibold text-dark">Your Progress</h2>
                <span id="mastery-percentage" class="text-2xl font-bold text-secondary">0%</span>
            </div>
            <div class="w-full bg-gray-200 rounded-full h-4 overflow-hidden">
                <div id="progress-bar" class="bg-secondary h-full rounded-full transition-all duration-500" style="width: 0%"></div>
            </div>
            <p class="text-gray-500 mt-2"><span id="words-learned">0</span> out of <span id="total-words">0</span> words mastered</p>
        </div>
