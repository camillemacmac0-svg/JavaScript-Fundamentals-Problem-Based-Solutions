<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Micro-Learning Flashcards</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>Micro-Learning Flashcards</h1>
            <p>Learn faster, remember longer</p>
        </div>
    </header>

<main class="container">
        <section id="progress-section">
            <div class="progress-header">
                <h2>Your Progress</h2>
                <span id="mastery-percentage">0%</span>
            </div>
            <div class="progress-bar-container">
                <div id="progress-bar"></div>
            </div>
            <p class="progress-text">
                <span id="words-learned">0</span> out of <span id="total-words">0</span> words mastered
            </p>
        </section>

    <section id="flashcard-section">
            <div id="flashcard" class="card-flip">
                <div class="card-inner">
                    <div class="card-front">
                        <h3 id="current-term">Click to start</h3>
                        <p>Tap card to reveal definition</p>
                    </div>
                    <div class="card-back">
                        <h3 id="current-definition">Definition will appear here</h3>
                    </div>
                </div>
            </div>

        <div class="buttons">
                <button id="know-btn">I Know This</button>
                <button id="next-btn">Next Card</button>
                <button id="shuffle-btn">Shuffle</button>
            </div>
        </section>

        <section id="add-section">
            <h2>Add New Word</h2>
            <form id="add-card-form">
                <div class="form-group">
                    <label for="term-input">Word / Term</label>
                    <input type="text" id="term-input" placeholder="e.g. gato" required>
                </div>
                <div class="form-group">
                    <label for="definition-input">Definition / Translation</label>
                    <input type="text" id="definition-input" placeholder="e.g. cat" required>
                </div>
                <button type="submit" class="submit-btn">Add to Deck</button>
            </form>
        </section>
    </main>

 <script src="script.js"></script>
</body>
</html>
